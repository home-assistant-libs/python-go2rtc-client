---
name: CI

# yamllint disable-line rule:truthy
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  pre-commit:
    name: pre-commit
    runs-on: ubuntu-latest
    env:
      PRE_COMMIT_HOME: /tmp/pre-commit-cache
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: 🏗 Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
      - name: 🏗 Set pre-commit cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ${{ env.PRE_COMMIT_HOME }}
          key: ${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml','.python-version') }}
      - name: 🚀 Run pre-commit
        env:
          # Skipping branch check and pytest as pytest is run in a separate job
          SKIP: no-commit-to-branch,pytest
        run: uv run --frozen pre-commit run -a

  pytest:
    name: pytest
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.12", "3.13", "3.14"]
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: 🏗 Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
      - name: 🏗 Set up Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}
      - name: 🏗 Install dependencies
        run: uv sync --frozen --dev
      - name: 🚀 Run pytest
        run: uv run pytest --cov go2rtc_client tests
      - name: ⬆️ Upload coverage artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          include-hidden-files: true
          name: coverage-${{ matrix.python }}
          path: .coverage

  coverage:
    runs-on: ubuntu-latest
    needs: pytest
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: ⬇️ Download coverage data
        uses: actions/download-artifact@v8.0.1
      - name: 🏗 Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
      - name: 🏗 Install dependencies
        run: uv sync --frozen --dev
      - name: 🚀 Process coverage results
        run: |
          uv run --frozen coverage combine coverage*/.coverage*
          uv run --frozen coverage xml -i
      - name: ⬆️ Upload coverage report
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
